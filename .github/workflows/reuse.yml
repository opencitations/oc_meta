name: REUSE compliance

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [master]

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: fsfe/reuse-action@v6
