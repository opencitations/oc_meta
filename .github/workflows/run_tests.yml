name: Run tests

on:
  push:
    branches:
      - "**" # All branches, including those with /
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install Python
        run: uv python install

      - name: Install project dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libncurses6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run tests with coverage
        run: |
          uv run coverage run --rcfile=test/coverage/.coveragerc
          echo "=== Coverage Report ==="
          uv run coverage report
          echo "COVERAGE=$(uv run coverage report | grep TOTAL | awk '{print $4}')" >> $GITHUB_ENV

      - name: Generate HTML coverage report
        run: |
          uv run coverage html -d htmlcov

      - name: Upload coverage report artifact (for master branch)
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

      - name: Determine badge color
        if: matrix.python-version == '3.10'
        run: |
          COVERAGE_NUM=$(echo ${{ env.COVERAGE }} | sed 's/%//')

          if (( $(echo "$COVERAGE_NUM >= 90" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE_NUM >= 75" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE_NUM >= 60" | bc -l) )); then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "BADGE_COLOR=$COLOR" >> $GITHUB_ENV

      - name: Generate coverage badge (for master branch)
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.10'
        uses: RubbaBoy/BYOB@v1.3.0
        with:
          name: opencitations-oc_meta_coverage
          label: "Coverage"
          status: "${{ env.COVERAGE }}"
          color: ${{ env.BADGE_COLOR }}
          github_token: ${{ secrets.GIST_PAT }}
          repository: arcangelo7/badges
          actor: arcangelo7
